<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa Club Sirio 2026 — Pádel</title>
<meta name="theme-color" content="#207B5B">
<meta name="description" content="Copa Club Sirio 2026 — Pádel · 4 Clubes · 5 Categorías · Organiza RED PADEL">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Archivo:wght@400;500;600;700;900&display=swap">
<style>
:root {
  --sirio-green-1: #0F5838;
  --sirio-green-2: #207B5B;
  --sirio-green-3: #2EA373;
  --sirio-green-soft: #E8F3EE;
  --sirio-green-deep: #0A3F27;
  --sirio-red: #D0021B;
  --cream: #F7F5F0;
  --white: #FFFFFF;
  --ink: #1A1A1A;
  --ink-soft: #3A3A3A;
  --gray: #777;
  --gray-light: #B8B8B8;
  --border: #E5E2DB;
  --border-strong: #D8D4CA;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--cream);
  color: var(--ink);
  font-family: 'Archivo', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  overflow-x: hidden;
}

/* =========================================
   HEADER CON DEGRADADO VERDE
   ========================================= */
.header {
  background:
    radial-gradient(ellipse at 30% 20%, rgba(46, 163, 115, 0.4) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 80%, rgba(15, 88, 56, 0.3) 0%, transparent 50%),
    linear-gradient(135deg, var(--sirio-green-1) 0%, var(--sirio-green-2) 50%, var(--sirio-green-3) 100%);
  padding: 32px 40px 28px;
  position: relative;
  overflow: hidden;
  color: var(--white);
}

/* Grano sutil sobre el gradiente para dar profundidad */
.header::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(45deg, rgba(255,255,255,.02) 0, rgba(255,255,255,.02) 1px, transparent 1px, transparent 40px),
    repeating-linear-gradient(-45deg, rgba(0,0,0,.02) 0, rgba(0,0,0,.02) 1px, transparent 1px, transparent 40px);
  pointer-events: none;
}

.header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: rgba(255,255,255,.2);
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  position: relative;
  z-index: 2;
}

.organiza {
  font-family: 'Archivo', sans-serif;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,.7);
  font-weight: 500;
}

.organiza strong {
  color: var(--white);
  font-weight: 700;
  letter-spacing: 2px;
}

.live-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  background: rgba(255,255,255,.15);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,.25);
  border-radius: 100px;
  color: var(--white);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.live-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 0 10px rgba(255,255,255,.8);
  animation: pulseDot 1.8s ease-in-out infinite;
}

@keyframes pulseDot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: .4; transform: scale(.7); }
}

.header-center {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 36px;
  padding: 14px 0 6px;
  position: relative;
  z-index: 2;
}

.logo {
  width: 110px;
  height: auto;
  flex-shrink: 0;
  filter: drop-shadow(0 6px 20px rgba(0,0,0,0.25));
}

.title-block {
  text-align: center;
}

.eyebrow {
  font-family: 'Archivo', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,.75);
  letter-spacing: 5px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.title {
  font-family: 'Oswald', sans-serif;
  font-size: 58px;
  font-weight: 700;
  letter-spacing: .02em;
  text-transform: uppercase;
  color: var(--white);
  line-height: .95;
  text-shadow: 0 2px 12px rgba(0,0,0,.15);
}

.title .accent {
  color: #FFE299;
  font-style: italic;
  font-weight: 600;
}

.subtitle-pill {
  display: inline-block;
  margin-top: 18px;
  padding: 10px 26px;
  background: var(--white);
  color: var(--sirio-green-1);
  border-radius: 100px;
  font-family: 'Archivo', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  box-shadow: 0 4px 16px rgba(0,0,0,.12);
}

/* =========================================
   STATS STRIP (blanco, debajo del header)
   ========================================= */
.stats-strip {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  background: var(--white);
  border-bottom: 1px solid var(--border);
}

.stat {
  padding: 20px 20px;
  text-align: center;
  border-right: 1px solid var(--border);
}

.stat:last-child { border-right: none; }

.stat-val {
  font-family: 'Oswald', sans-serif;
  font-size: 38px;
  font-weight: 700;
  color: var(--sirio-green-1);
  line-height: 1;
}

.stat-lbl {
  font-size: 10px;
  font-weight: 600;
  color: var(--gray);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 6px;
}

/* =========================================
   MAIN GRID
   ========================================= */
.main {
  padding: 32px 40px;
  max-width: 1600px;
  margin: 0 auto;
}

.grid {
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: 28px;
  align-items: start;
}

/* =========================================
   SECTION CARDS
   ========================================= */
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 1px 0 rgba(0,0,0,.02), 0 4px 12px rgba(0,0,0,.03);
}

.card + .card { margin-top: 24px; }

.card-header {
  background: linear-gradient(135deg, var(--sirio-green-1) 0%, var(--sirio-green-2) 100%);
  color: var(--white);
  padding: 15px 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-title {
  font-family: 'Oswald', sans-serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.card-sub {
  font-family: 'Archivo', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,.75);
}

/* =========================================
   TABLA GENERAL CLUBES
   ========================================= */
.club-row {
  display: flex;
  align-items: center;
  padding: 18px 22px;
  gap: 20px;
  border-bottom: 1px solid var(--border);
  transition: background .2s;
}

.club-row:last-child { border-bottom: none; }

.club-row.pos-1 {
  background: linear-gradient(90deg, var(--sirio-green-soft) 0%, transparent 70%);
}

.club-pos {
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  font-family: 'Oswald', sans-serif;
  font-size: 24px;
  font-weight: 700;
  flex-shrink: 0;
}

.pos-1 .club-pos {
  background: linear-gradient(135deg, var(--sirio-green-1) 0%, var(--sirio-green-3) 100%);
  color: var(--white);
  box-shadow: 0 4px 12px rgba(32,123,91,.3);
}

.pos-2 .club-pos {
  background: var(--sirio-green-soft);
  color: var(--sirio-green-deep);
  border: 1px solid var(--sirio-green-2);
}

.pos-3 .club-pos,
.pos-4 .club-pos {
  background: var(--cream);
  color: var(--ink-soft);
  border: 1px solid var(--border-strong);
}

.club-name {
  flex: 1;
  font-family: 'Oswald', sans-serif;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--ink);
}

.pos-4 .club-name { color: var(--gray); }

.club-pts {
  text-align: right;
  flex-shrink: 0;
  min-width: 72px;
}

.club-pts-val {
  font-family: 'Oswald', sans-serif;
  font-size: 34px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1;
}

.pos-1 .club-pts-val { color: var(--sirio-green-1); }

.club-pts-lbl {
  font-size: 9px;
  font-weight: 700;
  color: var(--gray);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 4px;
}

/* =========================================
   CATEGORIAS GRID
   ========================================= */
.cats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.cat-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,.02);
}

.cat-header {
  background: var(--ink);
  color: var(--white);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.cat-tag {
  display: inline-block;
  padding: 3px 8px;
  background: var(--sirio-green-2);
  color: var(--white);
  border-radius: 3px;
  font-family: 'Oswald', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.cat-tag.dam { background: var(--sirio-red); }

.cat-title {
  font-family: 'Oswald', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  flex: 1;
}

.cat-count {
  font-family: 'Archivo', monospace;
  font-size: 11px;
  color: rgba(255,255,255,.6);
  font-weight: 600;
}

.cat-row {
  display: flex;
  align-items: center;
  padding: 9px 14px;
  gap: 10px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
}

.cat-row:last-child { border-bottom: none; }

.cat-row.p1 {
  background: var(--sirio-green-soft);
}

.cat-pos {
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 3px;
  font-family: 'Oswald', sans-serif;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
}

.p1 .cat-pos {
  background: var(--sirio-green-2);
  color: var(--white);
}

.p2 .cat-pos {
  background: var(--white);
  color: var(--sirio-green-deep);
  border: 1px solid var(--sirio-green-2);
}

.p3 .cat-pos,
.p4 .cat-pos {
  background: var(--cream);
  color: var(--ink-soft);
  border: 1px solid var(--border-strong);
}

.cat-club {
  flex: 1;
  font-family: 'Oswald', sans-serif;
  font-weight: 600;
  font-size: 14px;
  letter-spacing: .5px;
  text-transform: uppercase;
  color: var(--ink);
}

.p3 .cat-club, .p4 .cat-club { color: var(--gray); font-weight: 500; }

.cat-wl {
  font-family: 'Oswald', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-soft);
  min-width: 38px;
  text-align: right;
}

.cat-dif {
  font-family: 'Oswald', sans-serif;
  font-size: 13px;
  font-weight: 700;
  min-width: 40px;
  text-align: right;
}

.cat-dif.pos-dif { color: var(--sirio-green-1); }
.cat-dif.neg-dif { color: var(--sirio-red); }
.cat-dif.zero-dif { color: var(--gray-light); }

.cat-empty {
  padding: 16px 14px;
  font-size: 11px;
  color: var(--gray-light);
  text-align: center;
  font-style: italic;
  font-weight: 500;
}

/* =========================================
   EN JUEGO
   ========================================= */
.live-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  padding: 16px;
}

.live-court {
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px;
  position: relative;
  overflow: hidden;
  transition: all .2s;
}

.live-court.active {
  background: var(--white);
  border-color: var(--sirio-green-2);
  border-width: 2px;
  padding: 13px;
  box-shadow: 0 4px 16px rgba(32,123,91,.12);
}

.live-court.active::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--sirio-green-1), var(--sirio-green-3));
}

.live-court.done {
  background: var(--white);
  border-color: var(--border-strong);
}

.live-cancha {
  font-family: 'Oswald', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--sirio-green-2);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.live-cat-tag {
  display: inline-block;
  padding: 2px 7px;
  background: var(--ink);
  color: var(--white);
  border-radius: 3px;
  font-family: 'Oswald', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.live-match {
  font-family: 'Oswald', sans-serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: .5px;
  text-transform: uppercase;
  line-height: 1.3;
  color: var(--ink);
}

.live-vs {
  color: var(--gray-light);
  font-weight: 500;
  margin: 0 4px;
  font-size: 11px;
}

.live-score {
  font-family: 'Oswald', sans-serif;
  font-size: 28px;
  font-weight: 700;
  margin-top: 10px;
  color: var(--sirio-green-1);
  line-height: 1;
}

.live-pending {
  font-family: 'Archivo', sans-serif;
  font-size: 11px;
  color: var(--gray);
  font-weight: 500;
  font-style: italic;
  margin-top: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.live-court.libre {
  background: transparent;
  border: 1px dashed var(--border-strong);
}

.live-court.libre .live-cancha { color: var(--gray-light); }

/* =========================================
   FOOTER VERDE INSTITUCIONAL CON DEGRADADO
   ========================================= */
.footer {
  background:
    radial-gradient(ellipse at 30% 20%, rgba(46, 163, 115, 0.3) 0%, transparent 60%),
    linear-gradient(135deg, var(--sirio-green-1) 0%, var(--sirio-green-2) 100%);
  color: var(--white);
  padding: 32px 40px 26px;
  text-align: center;
  margin-top: 32px;
  position: relative;
  overflow: hidden;
}

.footer::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--sirio-green-deep), var(--sirio-green-3), var(--sirio-green-deep));
}

.footer-main {
  font-family: 'Oswald', sans-serif;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  line-height: 1.2;
}

.footer-sub {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 12px;
  opacity: .8;
  font-weight: 500;
}

.footer-divider {
  width: 80px;
  height: 2px;
  background: rgba(255,255,255,.35);
  margin: 16px auto;
}

.footer-meta {
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: .6;
  font-weight: 600;
}

/* =========================================
   LOADING & ERROR
   ========================================= */
.loading {
  text-align: center;
  padding: 120px 20px;
}

.spinner {
  width: 44px;
  height: 44px;
  border: 3px solid var(--sirio-green-soft);
  border-top-color: var(--sirio-green-2);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin: 0 auto 20px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text {
  font-family: 'Oswald', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--gray);
  letter-spacing: 3px;
  text-transform: uppercase;
}

.error {
  text-align: center;
  padding: 80px 20px;
  color: var(--sirio-red);
  font-size: 14px;
  font-weight: 600;
}

.retry-btn {
  display: inline-block;
  margin-top: 16px;
  padding: 12px 28px;
  background: var(--sirio-green-2);
  border: none;
  border-radius: 100px;
  color: var(--white);
  font-family: 'Oswald', sans-serif;
  font-size: 13px;
  letter-spacing: 2px;
  font-weight: 700;
  cursor: pointer;
  text-transform: uppercase;
}

.retry-btn:hover { background: var(--sirio-green-deep); }

/* =========================================
   RESPONSIVE
   ========================================= */
@media (max-width: 1100px) {
  .grid { grid-template-columns: 1fr; gap: 20px; }
  .live-grid { grid-template-columns: 1fr 1fr; }
}

@media (max-width: 720px) {
  .header { padding: 20px 16px 18px; }
  .header-center { flex-direction: column; gap: 16px; }
  .logo { width: 80px; }
  .title { font-size: 34px; }
  .eyebrow { font-size: 9px; letter-spacing: 3px; }
  .main { padding: 18px 14px; }
  .cats-grid { grid-template-columns: 1fr; }
  .live-grid { grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px; }
  .club-row { padding: 14px; gap: 12px; }
  .club-name { font-size: 18px; }
  .club-pts-val { font-size: 26px; }
  .stat-val { font-size: 28px; }
  .footer { padding: 24px 16px; }
  .footer-main { font-size: 17px; letter-spacing: 2px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="live-pill">
      <span class="live-dot"></span>
      <span>En vivo</span>
    </div>
    <div class="organiza">Organiza <strong>Red Padel</strong></div>

<script>
var SHEET_ID = '1D7SgB7IMTs0ommVZPoHaGsxoK-WZnZELQ_ZqezI2iB0';
var SHEET_GID = '0';
var REFRESH_MS = 30000;

var CAT_ORDER = ['4ta', '5ta', '6ta', 'C', 'D'];
var CAT_LABELS = {
  '4ta': '4ta Masculino',
  '5ta': '5ta Masculino',
  '6ta': '6ta Masculino',
  'C':   'Damas C',
  'D':   'Damas D'
};
var CAT_TAGS = {
  '4ta': '4TA',
  '5ta': '5TA',
  '6ta': '6TA',
  'C':   'C',
  'D':   'D'
};
var CAT_IS_DAM = { '4ta': false, '5ta': false, '6ta': false, 'C': true, 'D': true };

function parseCSV(csv) {
  var lines = csv.split('\n'), M = [];
  for (var i = 1; i < lines.length; i++) {
    var line = lines[i].replace(/\r$/, '');
    if (!line.trim()) continue;
    var cols = [], cur = '', inQ = false;
    for (var j = 0; j < line.length; j++) {
      var ch = line[j];
      if (ch === '"') {
        if (inQ && line[j+1] === '"') { cur += '"'; j++; }
        else inQ = !inQ;
      } else if (ch === ',' && !inQ) { cols.push(cur); cur = ''; }
      else cur += ch;
    }
    cols.push(cur);
    var dia = (cols[0]||'').trim();
    var fecha = (cols[1]||'').trim();
    var cat = (cols[2]||'').trim();
    var ronda = parseInt(cols[3]);
    var cancha = (cols[4]||'').trim();
    var clubA = (cols[5]||'').trim();
    var clubB = (cols[6]||'').trim();
    var gA_raw = (cols[7]||'').trim();
    var gB_raw = (cols[8]||'').trim();
    var gA = gA_raw === '' ? null : parseInt(gA_raw);
    var gB = gB_raw === '' ? null : parseInt(gB_raw);
    if (cat && clubA && clubB && !isNaN(ronda)) {
      M.push({
        dia: dia, fecha: fecha, categoria: cat, ronda: ronda,
        cancha: cancha, clubA: clubA, clubB: clubB,
        gamesA: gA, gamesB: gB,
        played: (gA !== null && gB !== null)
      });
    }
  }
  return M;
}

function calcStandings(matches) {
  var byCat = {};
  matches.forEach(function(m) {
    if (!byCat[m.categoria]) byCat[m.categoria] = {};
    [m.clubA, m.clubB].forEach(function(club) {
      if (!byCat[m.categoria][club]) {
        byCat[m.categoria][club] = { club: club, pj: 0, pg: 0, pp: 0, gf: 0, gc: 0, dif: 0, h2h: {} };
      }
    });
  });

  matches.forEach(function(m) {
    if (!m.played) return;
    var stA = byCat[m.categoria][m.clubA];
    var stB = byCat[m.categoria][m.clubB];
    stA.pj++; stB.pj++;
    stA.gf += m.gamesA; stA.gc += m.gamesB;
    stB.gf += m.gamesB; stB.gc += m.gamesA;
    stA.dif = stA.gf - stA.gc;
    stB.dif = stB.gf - stB.gc;
    if (m.gamesA > m.gamesB) {
      stA.pg++; stB.pp++;
      stA.h2h[m.clubB] = 'W'; stB.h2h[m.clubA] = 'L';
    } else if (m.gamesB > m.gamesA) {
      stB.pg++; stA.pp++;
      stB.h2h[m.clubA] = 'W'; stA.h2h[m.clubB] = 'L';
    }
  });

  var standings = {};
  Object.keys(byCat).forEach(function(cat) {
    var arr = Object.values(byCat[cat]);
    arr.sort(function(a, b) {
      if (b.pg !== a.pg) return b.pg - a.pg;
      if (b.dif !== a.dif) return b.dif - a.dif;
      if (b.gf !== a.gf) return b.gf - a.gf;
      if (a.h2h[b.club] === 'W') return -1;
      if (a.h2h[b.club] === 'L') return 1;
      return 0;
    });
    standings[cat] = arr;
  });
  return standings;
}

function calcClubsGeneral(standings) {
  var pts = { Sirio: 0, Manquehue: 0, Palestino: 0, 'Español': 0 };
  var cats = { Sirio: 0, Manquehue: 0, Palestino: 0, 'Español': 0 };

  Object.keys(standings).forEach(function(cat) {
    var arr = standings[cat];
    var hayJuegos = arr.some(function(s) { return s.pj > 0; });
    if (!hayJuegos) return;

    arr.forEach(function(st, idx) {
      var puntos = [4, 3, 2, 1][idx] || 0;
      if (pts[st.club] !== undefined) {
        pts[st.club] += puntos;
        cats[st.club]++;
      }
    });
  });

  var general = Object.keys(pts).map(function(club) {
    return { club: club, pts: pts[club], cats: cats[club] };
  });
  general.sort(function(a, b) {
    if (b.pts !== a.pts) return b.pts - a.pts;
    return b.cats - a.cats;
  });
  return general;
}

function renderGeneral(general) {
  var h = '<div class="card">';
  h += '<div class="card-header"><div class="card-title">Tabla General</div><div class="card-sub">4 Clubes · 5 Categorías</div></div>';
  general.forEach(function(g, idx) {
    var pos = idx + 1;
    h += '<div class="club-row pos-' + pos + '">';
    h += '<div class="club-pos">' + pos + '°</div>';
    h += '<div class="club-name">Club ' + g.club + '</div>';
    h += '<div class="club-pts"><div class="club-pts-val">' + g.pts + '</div><div class="club-pts-lbl">Puntos</div></div>';
    h += '</div>';
  });
  h += '</div>';
  return h;
}

function renderEnJuego(matches) {
  var porRonda = {};
  matches.forEach(function(m) {
    if (!porRonda[m.ronda]) porRonda[m.ronda] = [];
    porRonda[m.ronda].push(m);
  });

  var rondasOrden = Object.keys(porRonda).map(Number).sort(function(a,b){return a-b});
  var rondaActual = null;
  for (var i = 0; i < rondasOrden.length; i++) {
    var r = rondasOrden[i];
    var alguno_pending = porRonda[r].some(function(m) { return !m.played; });
    if (alguno_pending) { rondaActual = r; break; }
  }
  if (rondaActual === null) rondaActual = rondasOrden[rondasOrden.length - 1];

  var partidos = porRonda[rondaActual] || [];
  partidos.sort(function(a,b){ return (parseInt(a.cancha)||0) - (parseInt(b.cancha)||0); });

  var jugados = partidos.filter(function(p){return p.played}).length;

  var h = '<div class="card">';
  h += '<div class="card-header"><div class="card-title">Ronda ' + rondaActual + '</div><div class="card-sub">' + jugados + '/' + partidos.length + ' Partidos</div></div>';
  h += '<div class="live-grid">';
  for (var c = 1; c <= 4; c++) {
    var m = partidos.find(function(p) { return parseInt(p.cancha) === c; });
    if (!m) {
      h += '<div class="live-court libre"><div class="live-cancha">Cancha ' + c + '</div><div class="live-pending">Libre</div></div>';
      continue;
    }
    var state = m.played ? 'done' : 'active';
    h += '<div class="live-court ' + state + '">';
    h += '<div class="live-cancha">Cancha ' + c + '</div>';
    h += '<div class="live-cat-tag">' + CAT_LABELS[m.categoria] + '</div>';
    h += '<div class="live-match">' + m.clubA + '<span class="live-vs">vs</span>' + m.clubB + '</div>';
    if (m.played) {
      h += '<div class="live-score">' + m.gamesA + ' – ' + m.gamesB + '</div>';
    } else {
      h += '<div class="live-pending">En juego</div>';
    }
    h += '</div>';
  }
  h += '</div></div>';
  return h;
}

function renderCategorias(standings) {
  var h = '<div class="card" style="border:none;background:transparent;box-shadow:none">';
  h += '<div class="cats-grid">';
  CAT_ORDER.forEach(function(cat) {
    var arr = standings[cat] || [];
    var anyPlayed = arr.some(function(s) { return s.pj > 0; });
    h += '<div class="cat-card">';
    h += '<div class="cat-header">';
    h += '<span class="cat-tag' + (CAT_IS_DAM[cat] ? ' dam' : '') + '">' + CAT_TAGS[cat] + '</span>';
    h += '<div class="cat-title">' + CAT_LABELS[cat] + '</div>';
    if (anyPlayed) {
      var pj = arr.reduce(function(s,x){return s+x.pj;},0) / 2;
      h += '<div class="cat-count">' + Math.round(pj) + '/6</div>';
    }
    h += '</div>';
    if (!anyPlayed) {
      h += '<div class="cat-empty">Aún no comienza</div>';
    } else {
      arr.forEach(function(st, idx) {
        var pos = idx + 1;
        var difClass = st.dif > 0 ? 'pos-dif' : st.dif < 0 ? 'neg-dif' : 'zero-dif';
        var difTxt = st.dif > 0 ? '+' + st.dif : st.dif;
        h += '<div class="cat-row p' + pos + '">';
        h += '<div class="cat-pos">' + pos + '</div>';
        h += '<div class="cat-club">' + st.club + '</div>';
        h += '<div class="cat-wl">' + st.pg + '-' + st.pp + '</div>';
        h += '<div class="cat-dif ' + difClass + '">' + difTxt + '</div>';
        h += '</div>';
      });
    }
    h += '</div>';
  });
  h += '</div></div>';
  return h;
}

function render(matches) {
  var standings = calcStandings(matches);
  var general = calcClubsGeneral(standings);
  var jugados = matches.filter(function(m) { return m.played; }).length;

  document.getElementById('stat-partidos').textContent = matches.length;
  document.getElementById('stat-jugados').textContent = jugados;
  document.getElementById('stat-restantes').textContent = matches.length - jugados;

  var h = '<div class="grid">';
  h += '<div>' + renderGeneral(general) + renderEnJuego(matches) + '</div>';
  h += '<div>' + renderCategorias(standings) + '</div>';
  h += '</div>';
  document.getElementById('main').innerHTML = h;
}

function showError(msg) {
  document.getElementById('main').innerHTML =
    '<div class="error">⚠ ' + msg + '<br><button class="retry-btn" onclick="loadData()">Reintentar</button></div>';
}

function loadData() {
  var gvizUrl = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:csv&gid=' + SHEET_GID;
  var csvExportUrl = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/export?format=csv&gid=' + SHEET_GID;
  var sources = [
    { name: 'gviz', url: gvizUrl },
    { name: 'corsproxy', url: 'https://corsproxy.io/?' + encodeURIComponent(csvExportUrl) },
    { name: 'codetabs', url: 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(csvExportUrl) }
  ];

  function tryNext(i) {
    if (i >= sources.length) { showError('No se pudo cargar la planilla'); return; }
    var src = sources[i];
    fetch(src.url + (src.url.indexOf('?') >= 0 ? '&' : '?') + '_=' + Date.now())
      .then(function(r) { if (!r.ok) throw new Error(src.name + ' HTTP ' + r.status); return r.text(); })
      .then(function(csv) {
        if (!csv || csv.length < 20) throw new Error('respuesta vacía');
        if (csv.trim().charAt(0) === '<') throw new Error('HTML en lugar de CSV');
        var matches = parseCSV(csv);
        if (!matches.length) throw new Error('sin partidos');
        render(matches);
      })
      .catch(function(err) {
        console.warn('Fuente ' + src.name + ' falló:', err.message);
        tryNext(i + 1);
      });
  }
  tryNext(0);
}

loadData();
setInterval(loadData, REFRESH_MS);
</script>
