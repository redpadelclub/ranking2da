<div class="header"><div class="header-grid"></div><div class="header-inner">

</div></div></div>

<div class="tabs">
<button class="tab active" onclick="sw('ranking',this)">Ranking</button>
<button class="tab" onclick="sw('history',this)">Resultados</button>

<script>
// ========================================
// GOOGLE SHEET CONFIG
// ========================================
var SHEET_ID = '1KGVNWhSNvFdLqhv-_XDZ0VBrB9nVEGKpH9ngszc_75c';


// ========================================
// ELO ENGINE
// K=32 primeros 10 partidos, K=24 después
// Incluye deltas por partido para mostrar cuántos puntos se ganaron/perdieron
// ========================================
function calcElo(matches) {
  var R = {}, G = {}, H = [];

  function gr(p) { if (!(p in R)) { R[p] = 1200; G[p] = 0; } return R[p]; }
  function gk(p) { return (G[p] || 0) < 10 ? 32 : 24; }
  function ex(a, b) { return 1 / (1 + Math.pow(10, (b - a) / 400)); }

  for (var i = 0; i < matches.length; i++) {
    var m = matches[i];
    var ra = (gr(m.a1) + gr(m.a2)) / 2;
    var rb = (gr(m.b1) + gr(m.b2)) / 2;
    var ea = ex(ra, rb), eb = 1 - ea;
    var aA, aB, km;
    if (m.sa > m.sb) { aA = 1; aB = 0; km = 1 + 0.5 * Math.min((m.sa - m.sb) / 6, 1); }
    else if (m.sb > m.sa) { aA = 0; aB = 1; km = 1 + 0.5 * Math.min((m.sb - m.sa) / 6, 1); }
    else { aA = 0.5; aB = 0.5; km = 1; }

    var teamA = [m.a1, m.a2], teamB = [m.b1, m.b2];

    // Calcular deltas individuales antes de actualizar ratings
    // delta = K * km * (resultado - esperado)
    // Guardamos delta promedio por equipo para mostrarlo en resultados
    var dA1 = gk(m.a1) * km * (aA - ea);
    var dA2 = gk(m.a2) * km * (aA - ea);
    var dB1 = gk(m.b1) * km * (aB - eb);
    var dB2 = gk(m.b2) * km * (aB - eb);

    // Delta promedio del equipo (lo que "se jugó" como equipo)
    var avgDeltaA = (dA1 + dA2) / 2;
    var avgDeltaB = (dB1 + dB2) / 2;

    // Actualizar ratings
    for (var j = 0; j < 2; j++) { R[teamA[j]] += (j === 0 ? dA1 : dA2); G[teamA[j]]++; }
    for (var j = 0; j < 2; j++) { R[teamB[j]] += (j === 0 ? dB1 : dB2); G[teamB[j]]++; }

    H.push({
      d: m.date, r: m.round,
      a: teamA, b: teamB,
      s: m.sa + '-' + m.sb,
      w: m.sa > m.sb ? 'A' : (m.sb > m.sa ? 'B' : 'D'),
      // Deltas individuales (para historial por jugador)
      deltaA1: dA1, deltaA2: dA2, deltaB1: dB1, deltaB2: dB2,
      // Delta promedio equipo (para vista de resultados generales)
      avgDeltaA: avgDeltaA, avgDeltaB: avgDeltaB
    });
  }

  var names = Object.keys(R);
  var rankings = [];
  for (var i = 0; i < names.length; i++) {
    var n = names[i], w = 0, l = 0, dp = {};
    for (var j = 0; j < H.length; j++) {
      var h = H[j];
      if (h.a.indexOf(n) >= 0) { dp[h.d] = 1; if (h.w === 'A') w++; else l++; }
      else if (h.b.indexOf(n) >= 0) { dp[h.d] = 1; if (h.w === 'B') w++; else l++; }
    }
    rankings.push({ name: n, rating: Math.round(R[n] * 10) / 10, games: G[n], wins: w, losses: l, win_rate: G[n] > 0 ? Math.round(w / G[n] * 1000) / 10 : 0, dates_played: Object.keys(dp).sort() });
  }
  rankings.sort(function(a, b) { return b.rating - a.rating; });

  var allDates = {};
  for (var i = 0; i < H.length; i++) allDates[H[i].d] = 1;
  var dates = Object.keys(allDates).sort();

  return { rankings: rankings, match_history: H, total_matchdays: dates.length, total_matches: H.length, last_updated: dates[dates.length - 1] || '' };
}

// ========================================
// CSV PARSER
// ========================================
function parseCSV(csv) {
  var lines = csv.split('\n'), M = [];
  for (var i = 1; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) continue;
    var cols = [], cur = '', inQ = false;
    for (var j = 0; j < line.length; j++) {
      var ch = line[j];
      if (ch === '"') inQ = !inQ;
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    cols.push(cur.trim());
    var dt = (cols[0] || '').replace(/"/g, '').trim();
    var rd = parseInt(cols[1]);
    // Col 2 = Cancha (skip). Players start at col 3.
    var a1 = (cols[3] || '').replace(/"/g, '').trim();
    var a2 = (cols[4] || '').replace(/"/g, '').trim();
    var sa = parseInt(cols[5]);
    var b1 = (cols[6] || '').replace(/"/g, '').trim();
    var b2 = (cols[7] || '').replace(/"/g, '').trim();
    var sb = parseInt(cols[8]);
    if (dt && a1 && a2 && b1 && b2 && !isNaN(sa) && !isNaN(sb) && !isNaN(rd)) {
      M.push({ date: dt, round: rd, a1: a1, a2: a2, sa: sa, b1: b1, b2: b2, sb: sb });
    }
  }
  return M;
}

// ========================================
// APP STATE
// ========================================
var DATA = null, VIEW = 'ranking', EXPANDED = null, SEARCH = '', FAQ_OPEN = null;

// ========================================
// LOAD DATA FROM GOOGLE SHEET
// ========================================
function loadData() {
  var csvUrl = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/export?format=csv&gid=0';
  var proxy  = 'https://corsproxy.io/?' + encodeURIComponent(csvUrl);

  function showError(msg) {
    document.getElementById('ct').innerHTML = '<div class="em">&#9888; ' + msg + '<br><button class="rfb" onclick="loadData()">Reintentar</button></div>';
  }

  fetch(proxy)
    .then(function(r) {
      if (!r.ok) throw new Error('Error de red (' + r.status + ')');
      return r.text();
    })
    .then(function(csv) {
      if (!csv || csv.trim().length < 20 || csv.trim().charAt(0) === '<') {
        throw new Error('La planilla no esta accesible publicamente');
      }
      var matches = parseCSV(csv);
      if (!matches.length) throw new Error('No hay partidos validos en la planilla');
      DATA = calcElo(matches);
      document.getElementById('sp').textContent = DATA.rankings.length;
      document.getElementById('sd').textContent = DATA.total_matchdays;
      document.getElementById('sm').textContent = DATA.total_matches;
      render();
    })
    .catch(function(err) { showError(err.message); });
}

// ========================================
// HELPERS
// ========================================
function fd(d) {
  if (!d) return '';
  var p = d.split('-');
  if (p.length !== 3) return d;
  var m = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return parseInt(p[2]) + ' ' + m[parseInt(p[1])];
}
function tier(r) {
  if (r >= 1300) return { l: 'ELITE', c: 'te' };
  if (r >= 1220) return { l: 'ORO', c: 'to' };
  if (r >= 1180) return { l: 'PLATA', c: 'tp' };
  return { l: 'BRONCE', c: 'tbr' };
}
function wcolor(wr) { return wr >= 60 ? '#22c55e' : wr >= 40 ? '#eab308' : '#ef4444'; }
function fmtDelta(v) {
  var r = Math.round(v * 10) / 10;
  return (r >= 0 ? '+' : '') + r;
}

// ========================================
// RENDER RANKING
// ========================================
function renderRanking() {
  if (!DATA) return '<div class="ld"><div class="ls"></div><div class="lt">Cargando ranking...</div></div>';

  var list = DATA.rankings;
  if (SEARCH) list = list.filter(function(p) { return p.name.toLowerCase().indexOf(SEARCH) >= 0; });

  var h = '<div class="search"><span class="search-icon">⌕</span><input type="text" placeholder="Buscar jugador..." oninput="os(this.value)" value="' + SEARCH + '"></div>';
  h += '<div class="updated">Última jornada: Domingo ' + fd(DATA.last_updated) + ' 2026</div>';

  if (!list.length) return h + '<div style="text-align:center;padding:40px;color:rgba(255,255,255,.25)">No se encontraron jugadores</div>';

  for (var i = 0; i < list.length; i++) {
    var p = list[i];
    var rank = DATA.rankings.indexOf(p) + 1;
    var t = tier(p.rating);
    var wr = p.games > 0 ? p.wins / p.games * 100 : 0;
    var isOpen = EXPANDED === p.name;
    var esc = p.name.replace(/'/g, "\\'");

    h += '<div class="pc ' + (rank <= 3 ? 't3' : 'nm') + '" onclick="tp(\'' + esc + '\')">';
    h += '<div class="pr">';
    h += '<div class="rb mono ' + (rank <= 3 ? 'r' + rank : 'ro') + '">' + (rank <= 3 ? rank : '#' + rank) + '</div>';
    h += '<div class="pi"><div class="pnr"><span class="pn">' + p.name + '</span><span class="tb ' + t.c + '">' + t.l + '</span></div>';
    h += '<div class="wb"><div class="wbg"><div class="wbf" style="width:' + wr + '%;background:' + wcolor(wr) + '"></div></div>';
    h += '<span class="mono" style="font-size:11px;color:rgba(255,255,255,.4)">' + p.wins + 'W-' + p.losses + 'L</span></div></div>';
    h += '<div class="rc"><div class="rn mono">' + Math.round(p.rating) + '</div>';
    h += '<div class="rs">' + p.games + ' partidos · ' + p.dates_played.length + ' dom.</div></div>';
    h += '<div class="ea ' + (isOpen ? 'op' : '') + '">▼</div></div>';

    if (isOpen) {
      h += '<div class="det op"><div class="sg">';
      var stats = [{ l: 'ELO', v: p.rating.toFixed(1) }, { l: 'Victorias', v: p.wins }, { l: 'Derrotas', v: p.losses }, { l: 'Win Rate', v: p.win_rate + '%' }];
      for (var s = 0; s < stats.length; s++) {
        h += '<div class="sb"><div class="sbl">' + stats[s].l + '</div><div class="sbv mono">' + stats[s].v + '</div></div>';
      }
      h += '</div>';

      // Historial de partidos del jugador
      var byDate = {};
      for (var j = 0; j < DATA.match_history.length; j++) {
        var m = DATA.match_history[j];
        if (m.a.indexOf(p.name) >= 0 || m.b.indexOf(p.name) >= 0) {
          if (!byDate[m.d]) byDate[m.d] = [];
          byDate[m.d].push(m);
        }
      }
      var sortedDates = Object.keys(byDate).sort().reverse();

      h += '<div class="ht">Historial de partidos</div>';
      for (var d = 0; d < sortedDates.length; d++) {
        var dt = sortedDates[d], ms = byDate[dt];
        h += '<div style="margin-bottom:10px"><div class="hd">Domingo ' + fd(dt) + '</div>';
        for (var k = 0; k < ms.length; k++) {
          var m = ms[k];
          var inA = m.a.indexOf(p.name) >= 0;
          var inA0 = inA && m.a[0] === p.name;
          var won = (inA && m.w === 'A') || (!inA && m.w === 'B');
          var partner = inA ? (m.a[0] === p.name ? m.a[1] : m.a[0]) : (m.b[0] === p.name ? m.b[1] : m.b[0]);
          var opp = inA ? m.b : m.a;
          var wl = won ? 'w' : 'l';

          // Delta individual de este jugador en este partido
          var myDelta;
          if (inA) { myDelta = inA0 ? m.deltaA1 : m.deltaA2; }
          else { myDelta = (m.b[0] === p.name) ? m.deltaB1 : m.deltaB2; }
          var deltaSign = myDelta >= 0 ? 'ep' : 'en';

          h += '<div class="mr ' + wl + '">';
          h += '<span class="mri ' + wl + '">' + (won ? 'W' : 'L') + '</span>';
          h += '<span style="color:rgba(255,255,255,.5);font-size:11px;flex:1">con <strong style="color:rgba(255,255,255,.7);font-weight:500">' + partner + '</strong> <span style="color:rgba(255,255,255,.25)">vs</span> ' + opp.join(' / ') + '</span>';
          h += '<span class="ms mono ' + wl + '">' + m.s + '</span>';
          h += '<span class="ed ' + deltaSign + '">' + fmtDelta(myDelta) + ' pts</span>';
          h += '</div>';
        }
        h += '</div>';
      }
      h += '</div>';
    }
    h += '</div>';
  }
  return h;
}

// ========================================
// RENDER RESULTS
// ========================================
function renderHistory() {
  if (!DATA) return '';
  var days = {};
  for (var i = 0; i < DATA.match_history.length; i++) {
    var m = DATA.match_history[i];
    if (!days[m.d]) days[m.d] = [];
    days[m.d].push(m);
  }
  var sortedDays = Object.keys(days).sort().reverse();

  var h = '';
  for (var i = 0; i < sortedDays.length; i++) {
    var dt = sortedDays[i], ms = days[dt];
    h += '<div class="rd"><div class="rdh"><span class="rdt">●</span>Domingo ' + fd(dt) + ' 2026 <span class="rdc">— ' + ms.length + ' partidos</span></div>';
    for (var rn = 1; rn <= 3; rn++) {
      var rm = ms.filter(function(m) { return m.r === rn; });
      if (!rm.length) continue;
      h += '<div style="margin-bottom:12px"><div class="rl">Ronda ' + rn + '</div>';
      for (var j = 0; j < rm.length; j++) {
        var m = rm[j];
        // Puntos disputados: el ganador ganó |avgDelta|, el perdedor perdió |avgDelta|
        // Como son simétricos en valor absoluto usamos avgDeltaA (el ganador siempre tiene delta positivo)
        var ptW = m.w === 'A' ? m.avgDeltaA : m.avgDeltaB;
        var ptL = m.w === 'A' ? m.avgDeltaB : m.avgDeltaA;
        var ptWf = fmtDelta(ptW); // positivo
        var ptLf = fmtDelta(ptL); // negativo

        h += '<div class="rm">';
        // Fila principal: equipos y score
        h += '<div class="rm-main">';
        h += '<div class="rt rtlf ' + (m.w === 'A' ? 'rtw' : 'rtl') + '">' + m.a.join(' / ') + '</div>';
        h += '<div class="rsc mono">' + m.s + '</div>';
        h += '<div class="rt ' + (m.w === 'B' ? 'rtw' : 'rtl') + '">' + m.b.join(' / ') + '</div>';
        h += '</div>';
        // Fila secundaria: puntos en disputa
        h += '<div class="rm-elo">';
        h += '<div class="rm-elo-side left">';
        h += '<span class="rm-elo-val ' + (m.w === 'A' ? 'pos' : 'neg') + '">' + (m.w === 'A' ? ptWf : ptLf) + '</span>';
        h += '<span class="rm-elo-lbl">&nbsp;pts ELO</span>';
        h += '</div>';
        h += '<div class="rm-elo-center">en disputa</div>';
        h += '<div class="rm-elo-side right">';
        h += '<span class="rm-elo-lbl">pts ELO&nbsp;</span>';
        h += '<span class="rm-elo-val ' + (m.w === 'B' ? 'pos' : 'neg') + '">' + (m.w === 'B' ? ptWf : ptLf) + '</span>';
        h += '</div>';
        h += '</div>';
        h += '</div>';
      }
      h += '</div>';
    }
    h += '</div>';
  }
  return h;
}

var FAQS = [

function renderFaq() {
  var h = '<div class="faq-intro">Estas son las preguntas más frecuentes de los jugadores sobre cómo funciona el sistema ELO del Ranking Domingos.</div>';
  for (var i = 0; i < FAQS.length; i++) {
    var isOpen = FAQ_OPEN === i;
    h += '<div class="faq-item">';
    h += '<div class="faq-q" onclick="tq(' + i + ')">';
    h += '<span class="faq-q-icon">P</span>';
    h += '<span class="faq-q-text">' + FAQS[i].q + '</span>';
    h += '<span class="faq-arr ' + (isOpen ? 'op' : '') + '">▼</span>';
    h += '</div>';
    if (isOpen) {
      h += '<div class="faq-a op">' + FAQS[i].a + '</div>';
    }
    h += '</div>';
  }
  return h;
}

// ========================================
// NAVIGATION / INTERACTION
// ========================================
function sw(v, el) {
  VIEW = v;
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  el.classList.add('active');
  render();
}h
function tp(n) { EXPANDED = EXPANDED === n ? null : n; render(); }
function os(v) { SEARCH = v.toLowerCase(); render(); }
function tq(i) { FAQ_OPEN = FAQ_OPEN === i ? null : i; render(); }

// ========================================
// RENDER
// ========================================
function render() {
  if (VIEW === 'ranking') document.getElementById('ct').innerHTML = renderRanking();
  else if (VIEW === 'history') document.getElementById('ct').innerHTML = renderHistory();
  else if (VIEW === 'faq') document.getElementById('ct').innerHTML = renderFaq();
}
